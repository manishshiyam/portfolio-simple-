<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">

        <div class="section-one">
            <h1 class="section-one__name">Manish Shiyam</h1>
            <h4 class="section-one__role">Web Developer</h4>
            <a href="index.html" class="section-one__contact">Home</a>
        </div>

        <div class="contact-form">
             <form>
            <table>
                <tr>
                    <td>Name:</td>
                    <td><input type="text" name="name" placeholder="enter your name" class="contact-form__input"></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email" name="email" placeholder="enter your email" class="contact-form__input"></td>
                </tr>
                <tr>
                    <td>
                        Message:
                    </td>
                    <td><textarea name="message" placeholder="enter your message" class="contact-form__textarea"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td colspan="2"><input type="submit" value="Submit" class="contact-form__submit"></td>
                </tr>
            </table>
            <table>
                <tr>
                    <div class="section-five">
                        <h4 class="section-five__title">Social Media:</h4>
                        <ul>
                            <li><a href="https://www.linkedin.com/in/manish-shiyamv/" target="_blank">LinkedIn</a></li>
                            <li><a href="https://github.com/manishshiyam" target="_blank">GitHub</a></li>
                        </ul>
                        <p class="section-five__desc">&copy; Manish Shiyam</p>
                    </div>
                </tr>
            </table>
        </form>


        </div>

       
    </div>

</body>

</html>
